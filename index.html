<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>WebGL2 TF Swarm</title>
		<style>
			body {
				margin: 0;
				overflow: hidden;
				background: #111;
				color: #fff;
				font-family: monospace;
			}
			canvas {
				display: block;
				width: 100vw;
				height: 100vh;
			}
			#ui {
				position: fixed;
				top: 10px;
				left: 10px;
				padding: 10px;
				background: rgba(0, 0, 0, 0.8);
				border: 1px solid #333;
			}
			#controls {
				position: fixed;
				top: 20px;
				right: 20px;
				display: flex;
				flex-direction: column;
				gap: 10px;
				z-index: 100;
			}
			#controls button {
				background: rgba(0, 0, 0, 0.6);
				color: #00f2ff; /* Match your teal/neon theme */
				border: 1px solid #00f2ff;
				padding: 8px 15px;
				cursor: pointer;
				font-family: monospace;
				transition: all 0.2s;
			}
			#controls button:hover {
				background: #00f2ff;
				color: black;
			}
		</style>
	</head>
	<body>
		<div id="ui">GPGPUting...</div>
		<div id="controls">
			<button onclick="app.reset(100000)">100K</button>
			<button onclick="app.reset(500000)">500K</button>
			<button onclick="app.reset(1000000)">1M</button>
		</div>
		<canvas id="glcanvas"></canvas>
		<script type="module" src="/src/index.ts" content-type="application/javascript"></script>
	</body>
</html>
