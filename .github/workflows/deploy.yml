name: Deploy to GitHub Pages

on:
    push:
        branches: ["100K-500K-1M"] # Triggers on your specific branch

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
    contents: read
    pages: write
    id-token: write

# Allow only one concurrent deployment
concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build-and-deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20 # Node 24 is currently in nightly/unstable; 20 is the current LTS
                  cache: "yarn"

            - name: Install Dependencies
              run: yarn install --immutable # Uses yarn.lock for clean, reliable installs

            - name: Build Project
              run: yarn build # Compiles your .ts to .js and bundles everything

            - name: Setup Pages
              uses: actions/configure-pages@v4

            - name: Upload Artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: "./dist" # IMPORTANT: Change to './build' if your framework outputs there instead of 'dist'

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
