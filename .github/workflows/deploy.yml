name: Deploy to GitHub Pages

on:
    push:
        branches: ["100K-500K-1M"] # Triggers on your specific branch

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
    contents: read
    pages: write
    id-token: write

# Allow only one concurrent deployment
concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    build-and-deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24 # You can change this to 18 if needed

            - name: Install Dependencies
              run: npm install # Uses package-lock.json for clean, reliable installs

            - name: Build Project
              run: npm run build # Compiles your .ts to .js and bundles everything

            - name: Setup Pages
              uses: actions/configure-pages@v4

            - name: Upload Artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "./dist" # IMPORTANT: Change to './build' if your framework outputs there instead of 'dist'

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
